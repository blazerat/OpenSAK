name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system Qt dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-shape0 libglib2.0-0 \
            libxcb-cursor0 libfontconfig1 libfreetype6

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          source .venv/bin/activate
          pytest tests/unit-tests -v --cov=opensak --cov-report=term-missing

  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system Qt dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb libgl1-mesa-dev libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-shape0 libglib2.0-0 \
            libxcb-cursor0 libfontconfig1 libfreetype6

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run e2e tests
        env:
          QT_QPA_PLATFORM: xcb
          QTWEBENGINE_CHROMIUM_FLAGS: "--disable-gpu --disable-software-rasterizer"
        run: |
          source .venv/bin/activate
          xvfb-run -a --server-args="-screen 0 1280x1024x24" \
            pytest tests/e2e-tests -v --cov=opensak --cov-report=term-missing
