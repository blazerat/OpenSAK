name: Quality

# Reusable static-analysis gate: mypy over the whole repo
# (package, entry point, scripts and tests — see [tool.mypy] in pyproject.toml).
on:
  workflow_call:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run mypy
        run: mypy
      # Checked separately: it shares the module name "conftest" with the unit
      # suite's conftest, so mypy can't load both in one run (see pyproject).
      - name: Run mypy on the e2e conftest
        run: mypy tests/e2e-tests/conftest.py
