name: Tests

# Reusable test suite: called by ci.yml (push/PR) and build.yml (release gate).
on:
  workflow_call:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: ./.github/actions/setup-qt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/unit-tests -v --cov=opensak --cov-report=term-missing

  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: ./.github/actions/setup-qt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run e2e tests
        env:
          QT_QPA_PLATFORM: xcb
          QTWEBENGINE_CHROMIUM_FLAGS: "--disable-gpu --disable-software-rasterizer"
        run: xvfb-run -a --server-args="-screen 0 1280x1024x24" pytest tests/e2e-tests -v --cov=opensak --cov-report=term-missing
